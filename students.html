<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Result Analyzer</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen p-6 md:p-12">

  <div class="max-w-5xl mx-auto">
    
    <!-- Top Bar & Selector -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8">
      <div>
        <h1 class="text-2xl font-bold tracking-tight text-slate-900">Result Analyzer</h1>
        <p class="text-sm text-slate-500">Select a student to view individual performance and subject breakdowns.</p>
      </div>
      
      <div class="relative min-w-[200px]">
        <label for="studentSelector" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1.5">Select Student</label>
        <select id="studentSelector" class="w-full bg-white border border-slate-200 text-slate-700 py-2.5 px-3.5 pr-8 rounded-lg shadow-xs focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 appearance-none cursor-pointer text-sm font-medium">
          <option value="sarah">Sarah Jenkins</option>
          <option value="rahul">Rahul Sharma</option>
          <option value="chloe">Chloe Dubois</option>
        </select>
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3 pt-5 text-slate-400">
          <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </div>
      </div>
    </div>

    <!-- Floating Metric Cards Dashboard Section -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
      
      <!-- Card 1: Active Profile -->
      <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-100 transform transition-all duration-300 hover:-translate-y-1 hover:shadow-lg flex items-center gap-4">
        <div class="p-3 bg-blue-50 text-blue-600 rounded-xl">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
        </div>
        <div>
          <p class="text-xs font-medium uppercase tracking-wider text-slate-400">Selected Student</p>
          <h3 id="metricName" class="text-lg font-bold text-slate-900 mt-0.5">Sarah Jenkins</h3>
        </div>
      </div>

      <!-- Card 2: Floating Average CGPA Card (Highlighted) -->
      <div class="relative bg-linear-to-br from-blue-600 to-indigo-700 p-6 rounded-2xl shadow-xl border border-blue-700/20 transform transition-all duration-300 hover:-translate-y-1 hover:shadow-2xl text-white">
        <div class="absolute -top-3 -right-3 bg-amber-400 text-slate-950 text-[10px] font-bold px-2 py-0.5 rounded-full shadow-xs uppercase tracking-wider">
          Live Metric
        </div>
        <div class="flex items-center justify-between">
          <div>
            <p class="text-xs font-medium uppercase tracking-wider text-blue-100/80">Average CGPA</p>
            <h2 id="metricCgpa" class="text-3xl font-black mt-1 tracking-tight">3.85</h2>
          </div>
          <div class="p-3 bg-white/10 rounded-xl backdrop-blur-xs">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          </div>
        </div>
      </div>

      <!-- Card 3: Total Credits earned -->
      <div class="bg-white p-6 rounded-2xl shadow-md border border-slate-100 transform transition-all duration-300 hover:-translate-y-1 hover:shadow-lg flex items-center gap-4">
        <div class="p-3 bg-emerald-50 text-emerald-600 rounded-xl">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
        </div>
        <div>
          <p class="text-xs font-medium uppercase tracking-wider text-slate-400">Total Credits</p>
          <h3 id="metricCredits" class="text-lg font-bold text-slate-900 mt-0.5">15 Credits</h3>
        </div>
      </div>

    </div>

    <!-- Subject Wise Analysis Section -->
    <div class="bg-white rounded-2xl shadow-xs border border-slate-200 overflow-hidden">
      <div class="px-6 py-4 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
        <h3 class="font-semibold text-slate-800">Subject-wise Performance</h3>
        <span class="text-xs font-medium px-2.5 py-1 rounded-full bg-slate-200/60 text-slate-600">Core Curriculum</span>
      </div>
      
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b border-slate-200 text-xs font-semibold uppercase tracking-wider text-slate-400 bg-slate-50/30">
              <th class="py-4 px-6">Subject Name</th>
              <th class="py-4 px-6 text-center">Credits</th>
              <th class="py-4 px-6 text-center">Grade Obtained</th>
              <th class="py-4 px-6 text-right">Score Percentage</th>
            </tr>
          </thead>
          <tbody id="subjectTableBody" class="divide-y divide-slate-100 text-sm">
            <!-- Dynamic rows get injected here -->
          </tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Interactive Logic Script -->
  <script>
    // Mock dataset representing analyzed results
    const dynamicStudents = {
      sarah: {
        name: "Sarah Jenkins",
        cgpa: "3.85",
        credits: "15",
        subjects: [
          { name: "Advanced Calculus", credits: 3, grade: "A", score: 94 },
          { name: "Quantum Physics", credits: 3, grade: "A-", score: 89 },
          { name: "Organic Chemistry", credits: 3, grade: "A", score: 96 },
          { name: "Data Structures", credits: 3, grade: "B+", score: 87 },
          { name: "Technical Writing", credits: 3, grade: "A", score: 92 }
        ]
      },
      rahul: {
        name: "Rahul Sharma",
        cgpa: "3.62",
        credits: "15",
        subjects: [
          { name: "Advanced Calculus", credits: 3, grade: "B+", score: 86 },
          { name: "Quantum Physics", credits: 3, grade: "A", score: 93 },
          { name: "Organic Chemistry", credits: 3, grade: "B", score: 81 },
          { name: "Data Structures", credits: 3, grade: "A", score: 95 },
          { name: "Technical Writing", credits: 3, grade: "A-", score: 88 }
        ]
      },
      chloe: {
        name: "Chloe Dubois",
        cgpa: "3.94",
        credits: "15",
        subjects: [
          { name: "Advanced Calculus", credits: 3, grade: "A", score: 98 },
          { name: "Quantum Physics", credits: 3, grade: "A", score: 95 },
          { name: "Organic Chemistry", credits: 3, grade: "A-", score: 91 },
          { name: "Data Structures", credits: 3, grade: "A", score: 97 },
          { name: "Technical Writing", credits: 3, grade: "A", score: 93 }
        ]
      }
    };

    // DOM Elements
    const selector = document.getElementById('studentSelector');
    const metricName = document.getElementById('metricName');
    const metricCgpa = document.getElementById('metricCgpa');
    const metricCredits = document.getElementById('metricCredits');
    const tableBody = document.getElementById('subjectTableBody');

    // Render function to swap user data cleanly
    function renderStudentDashboard(studentKey) {
      const student = dynamicStudents[studentKey];
      if (!student) return;

      // Update Floating Cards data instantly
      metricName.textContent = student.name;
      metricCgpa.textContent = student.cgpa;
      metricCredits.textContent = `${student.credits} Credits`;

      // Clear the current subject grid layout
      tableBody.innerHTML = '';

      // Loop through subjects and build rows with condition-based score color tags
      student.subjects.forEach(sub => {
        const row = document.createElement('tr');
        row.className = 'hover:bg-slate-50/80 transition-colors';

        // Check performance color coding
        const scoreBadgeClass = sub.score >= 90 
          ? 'bg-emerald-50 text-emerald-700 font-semibold' 
          : sub.score >= 85 ? 'bg-blue-50 text-blue-700 font-semibold' : 'bg-amber-50 text-amber-700 font-semibold';

        row.innerHTML = `
          <td class="py-4 px-6 font-medium text-slate-900">${sub.name}</td>
          <td class="py-4 px-6 text-center text-slate-500">${sub.credits}</td>
          <td class="py-4 px-6 text-center">
            <span class="inline-flex items-center justify-center px-2.5 py-0.5 rounded-md text-xs font-bold tracking-wide ${sub.grade.startsWith('A') ? 'text-blue-600 bg-blue-50/50' : 'text-slate-600 bg-slate-100'}">
              ${sub.grade}
            </span>
          </td>
          <td class="py-4 px-6 text-right">
            <span class="px-2 py-1 rounded-sm text-xs ${scoreBadgeClass}">${sub.score}%</span>
          </td>
        `;
        tableBody.appendChild(row);
      });
    }

    // Set up change event listener on selector dropdown
    selector.addEventListener('change', (e) => {
      renderStudentDashboard(e.target.value);
    });

    // Run once on load to populate default initial state (Sarah)
    renderStudentDashboard('sarah');
  </script>
</body>
</html>
